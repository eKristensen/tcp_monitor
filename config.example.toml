# tcp-monitor configuration
# Copy to /etc/tcp-monitor/config.toml and edit for each node.
# The binary watches this file with inotify; saving it adds/removes peer
# sessions without restarting the service.

[node]
# Unique name for this node. Appears as the "node" label in all metrics,
# and is sent to peer servers so they can label inbound sessions by name.
name = "server1"

[server]
# All fields are optional; these are the defaults.
bind            = "0.0.0.0"
port            = 9700   # heartbeat port (clients connect here)
metrics_port    = 9701   # Prometheus scrape endpoint  GET /metrics
probe_port      = 9702   # Blackbox Exporter probe port (sends "TCP-MONITOR OK\r\n")
recv_timeout    = 90     # seconds with no heartbeat before session is declared timed out

# Optional: connect to these peers as a client.
# Remove the [client] section and all [[peers]] entries to run as server-only.
[client]
heartbeat_interval = 30   # seconds between outbound heartbeats
max_misses         = 3    # consecutive missed echoes before closing the session
reconnect_delay    = 10   # seconds to wait before reconnecting after a disconnect

[[peers]]
name = "server2"
host = "192.168.1.2"
port = 9700   # optional, defaults to 9700

[[peers]]
name = "server3"
host = "192.168.1.3"

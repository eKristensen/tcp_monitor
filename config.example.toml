# tcp-monitor configuration
# Copy to /etc/tcp-monitor/config.toml and edit for each node.
# Run "systemctl reload tcp-monitor" (SIGHUP) to apply peer changes live.
# Changes to [server] bind/port/probe_port/metrics_port and [client] timing
# require a full restart.

[node]
# Unique name for this node. Appears as the "node" label in all metrics,
# and is sent to peer servers so they can label inbound sessions by name.
name = "server1"

[server]
bind                   = "0.0.0.0"
port                   = 9700   # heartbeat port (clients connect here)
probe_port             = 9701   # Blackbox Exporter probe port (sends "TCP-MONITOR OK\r\n")
metrics_port           = 9702   # Prometheus scrape endpoint  GET /metrics  (local only)
heartbeat_recv_timeout = 90     # seconds with no heartbeat before a server session is declared timed out
probe_idle_timeout     = 30     # seconds before a probe connection that never closes is dropped

# Optional: connect to these peers as a client.
# Remove the [client] section and all [[peers]] entries to run as server-only.
[client]
heartbeat_interval = 30   # seconds between outbound heartbeats
max_misses         = 3    # consecutive missed echoes before closing the session
reconnect_delay    = 10   # seconds to wait before reconnecting after a disconnect

[[peers]]
name = "server2"
host = "192.168.1.2"
port = 9700

[[peers]]
name = "server3"
host = "192.168.1.3"
port = 9700

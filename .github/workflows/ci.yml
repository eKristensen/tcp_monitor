name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Build, lint, and integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      # -----------------------------------------------------------------------
      # Smoke test: server-only mode
      # Checks that /metrics responds and the probe port sends the right banner.
      # -----------------------------------------------------------------------
      - name: Smoke test
        run: |
          set -euo pipefail

          cat > /tmp/smoke.toml << 'TOML'
          [node]
          name = "ci-smoke"
          [server]
          port         = 19700
          metrics_port = 19701
          probe_port   = 19702
          recv_timeout = 10
          TOML

          ./target/release/tcp-monitor --config /tmp/smoke.toml &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true' EXIT

          # Wait up to 15 s for the metrics endpoint to become ready.
          curl -sf --retry 15 --retry-delay 1 --retry-connrefused \
            http://localhost:19701/metrics > /dev/null

          # Probe port must respond with the expected banner.
          # Python avoids OpenBSD netcat's early-exit-on-stdin-EOF behaviour
          # and correctly strips the trailing \r from "TCP-MONITOR OK\r\n".
          BANNER=$(python3 - << 'PYEOF'
          import socket, sys
          try:
              with socket.create_connection(('127.0.0.1', 19702), timeout=5) as s:
                  data = s.recv(64).decode().strip()
                  print(data)
          except Exception as e:
              print('CONNECT_ERROR:', e, file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          if [[ "$BANNER" != "TCP-MONITOR OK" ]]; then
            echo "ERROR: probe banner was '$BANNER', expected 'TCP-MONITOR OK'"
            exit 1
          fi

          echo "Smoke test passed"

      # -----------------------------------------------------------------------
      # End-to-end heartbeat test
      # Starts a server and a client; after a few 2-second heartbeats both sides
      # must show non-zero counters in /metrics.
      # -----------------------------------------------------------------------
      - name: End-to-end heartbeat test
        run: |
          set -euo pipefail

          cat > /tmp/e2e-server.toml << 'TOML'
          [node]
          name = "ci-server"
          [server]
          port         = 19710
          metrics_port = 19711
          probe_port   = 19712
          recv_timeout = 10
          TOML

          cat > /tmp/e2e-client.toml << 'TOML'
          [node]
          name = "ci-client"
          [server]
          port         = 19720
          metrics_port = 19721
          probe_port   = 19722
          recv_timeout = 10
          [client]
          heartbeat_interval = 2
          max_misses         = 3
          reconnect_delay    = 2
          [[peers]]
          name = "ci-server"
          host = "127.0.0.1"
          port = 19710
          TOML

          ./target/release/tcp-monitor --config /tmp/e2e-server.toml &
          SRV=$!
          ./target/release/tcp-monitor --config /tmp/e2e-client.toml &
          CLI=$!
          trap 'kill "$SRV" "$CLI" 2>/dev/null || true; wait "$SRV" "$CLI" 2>/dev/null || true' EXIT

          # Wait for both metrics endpoints to come up.
          curl -sf --retry 15 --retry-delay 1 --retry-connrefused \
            http://localhost:19711/metrics > /dev/null
          curl -sf --retry 15 --retry-delay 1 --retry-connrefused \
            http://localhost:19721/metrics > /dev/null

          # Allow at least 3 heartbeats at 2 s interval.
          sleep 8

          SRV_METRICS=$(curl -sf http://localhost:19711/metrics)
          CLI_METRICS=$(curl -sf http://localhost:19721/metrics)

          # Server must have received heartbeats from the client.
          SRV_HB=$(echo "$SRV_METRICS" \
            | grep 'tcp_monitor_server_heartbeats_received_total{node="ci-server",peer="ci-client"}' \
            | awk '{print $2}')
          if [[ -z "$SRV_HB" ]] || [[ "${SRV_HB%.*}" -lt 2 ]]; then
            echo "ERROR: server heartbeats_received=$SRV_HB, expected >=2"
            echo "--- server metrics ---"; echo "$SRV_METRICS"
            exit 1
          fi

          # Client must have received echoes from the server.
          CLI_HB=$(echo "$CLI_METRICS" \
            | grep 'tcp_monitor_client_heartbeats_received_total{node="ci-client",peer="ci-server"}' \
            | awk '{print $2}')
          if [[ -z "$CLI_HB" ]] || [[ "${CLI_HB%.*}" -lt 2 ]]; then
            echo "ERROR: client heartbeats_received=$CLI_HB, expected >=2"
            echo "--- client metrics ---"; echo "$CLI_METRICS"
            exit 1
          fi

          # RTT must be set and non-zero.
          RTT=$(echo "$CLI_METRICS" \
            | grep 'tcp_monitor_client_heartbeat_rtt_seconds{' \
            | awk '{print $2}')
          if [[ -z "$RTT" ]] || [[ "$RTT" == "0" ]]; then
            echo "ERROR: RTT is '$RTT', expected a non-zero value"
            exit 1
          fi

          echo "E2E test passed (srv_hb=$SRV_HB cli_hb=$CLI_HB rtt=$RTT)"

      # -----------------------------------------------------------------------
      # SIGHUP reload test
      # Sends SIGHUP to trigger a config reload; the process must keep running
      # and continue serving /metrics.
      # -----------------------------------------------------------------------
      - name: SIGHUP reload test
        run: |
          set -euo pipefail

          cat > /tmp/reload.toml << 'TOML'
          [node]
          name = "ci-reload"
          [server]
          port         = 19730
          metrics_port = 19731
          probe_port   = 19732
          recv_timeout = 10
          TOML

          ./target/release/tcp-monitor --config /tmp/reload.toml &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true' EXIT

          curl -sf --retry 15 --retry-delay 1 --retry-connrefused \
            http://localhost:19731/metrics > /dev/null

          kill -HUP "$PID"
          sleep 1

          # Must still be running and serving metrics after SIGHUP.
          curl -sf http://localhost:19731/metrics > /dev/null

          echo "SIGHUP reload test passed"

      # -----------------------------------------------------------------------
      # Bad-config SIGHUP test
      # Replaces the config with invalid TOML and sends SIGHUP. The process must
      # log the error and keep running with the previous (valid) config.
      # -----------------------------------------------------------------------
      - name: Bad config does not crash on SIGHUP
        run: |
          set -euo pipefail

          cat > /tmp/badcfg.toml << 'TOML'
          [node]
          name = "ci-badcfg"
          [server]
          port         = 19740
          metrics_port = 19741
          probe_port   = 19742
          recv_timeout = 10
          TOML

          ./target/release/tcp-monitor --config /tmp/badcfg.toml &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true' EXIT

          curl -sf --retry 15 --retry-delay 1 --retry-connrefused \
            http://localhost:19741/metrics > /dev/null

          # Overwrite config with invalid TOML, then reload.
          echo 'this is not valid toml = {{{{' > /tmp/badcfg.toml
          kill -HUP "$PID"
          sleep 1

          # Process must still be running.
          if ! curl -sf http://localhost:19741/metrics > /dev/null; then
            echo "ERROR: process crashed after SIGHUP with bad config"
            exit 1
          fi

          echo "Bad-config SIGHUP test passed"

      # -----------------------------------------------------------------------
      # Systemd unit file validation
      # Installs the binary and uses systemd-analyze to verify the unit file.
      # -----------------------------------------------------------------------
      - name: Validate systemd unit file
        run: |
          sudo cp target/release/tcp-monitor /usr/local/bin/tcp-monitor
          sudo mkdir -p /etc/tcp-monitor
          printf '[node]\nname = "ci"\n' | sudo tee /etc/tcp-monitor/config.toml > /dev/null
          systemd-analyze verify tcp-monitor.service
